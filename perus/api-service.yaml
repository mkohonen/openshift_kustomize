apiVersion: v1
kind: Service
metadata:
  name: api-service
  annotations:
    # TÄMÄ linkittää BackendConfigin (backend-config.yaml) tähän serviceen:
    cloud.google.com/backend-config: '{"default": "api-backend-config"}'
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8090 # HUOM tämä on application.prop arvo, tarkasta se
  type: NodePort  # Aiemmin ClusterIP Sisäinen verkko riittää, jos UI kutsuu tätä
  #Ingress vaatii yleensä, että sen takana olevat Servicet ovat joko NodePort tai ClusterIP 
  #(GCP:ssä NodePort on suositeltu varmuuden vuoksi).