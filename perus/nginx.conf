# Miksi tämä versio?

#/tmp/ -polut: Tavallinen Nginx yrittää kirjoittaa /var/cache/nginx/, mikä on OpenShiftissä kielletty. /tmp/ on 
# yleensä sallittu kirjoittamiseen.
# listen 8080: Kuten aiemmin todettiin, OpenShift ei salli porttia 80 oletuksena.
# try_files: Tämä on kriittinen React-sovelluksille. Ilman tätä selaimen "Refresh" (päivitys) antaa 404-virheen, jos # käyttäjä on muulla sivulla kuin etusivulla.

worker_processes auto;
# OpenShiftissä nginx ei voi kirjoittaa /var/run/nginx.pid
pid /tmp/nginx.pid; 

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # OpenShift-ystävälliset polut väliaikaistiedostoille (vaatii kirjoitusoikeuden)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile        on;
    keepalive_timeout  65;

    server {
        # OpenShift vaatii portin > 1024
        listen 8080;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # React/SPA reititys: ohjaa kaikki pyynnöt index.html:ään
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Välimuistitus staattisille tiedostoille (optio)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Virhesivut
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
