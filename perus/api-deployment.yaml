apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-api
spec:
  # Replikoiden määrä kannattaa jättää kustomizen hallittavaksi, 
  # mutta oletus on hyvä olla tässä.
  replicas: 1 
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      # 1. OpenShiftissä 'default' SA riittää usein, jos et tarvitse erikoisoikeuksia.
      # Jos käytät omaa, varmista että se on luotu OpenShiftiin.
      serviceAccountName: my-app-ksa 
      
      # 2. Lisää tämä, jotta OpenShift saa haettua kuvat Google Artifact Registrystä
      imagePullSecrets:
        - name: google-registry-key 

      containers:
      - name: api-container
        image: api-image 
        ports:
          - containerPort: 8090
        
        # 3. OpenShift vaatii usein selkeät resurssirajat, jotta se mahtuu Quotaan.
        # Nämä GKE-arvosi ovat hyvät ja toimivat sellaisenaan.
        resources:
          requests:
            cpu: "50m"
            memory: "512Mi"
          limits:
            cpu: "200m"
            memory: "1024Mi"
        
        # 4. LISÄYS: OpenShift Security Context
        # GKE:ssä ajetaan usein rootina, OpenShiftissä ei saa. 
        # Spring Bootille on hyvä määrittää non-root, jos image sallii.
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
